<c-vars icon="receipt-off" message="No se encontraron registros." class="" />

<div class="text-center py-8 text-slate-400 text-xs bg-white dark:bg-brandBg border-x border-b border-slate-200 dark:border-brandHover {{ attrs.class }} rounded-b-2xl">
    {% if icon %}
        <c-ui.icon name="{{ icon }}" class="text-3xl mb-2 block text-slate-300 dark:text-slate-600" />
    {% endif %}
    <p>{{ message }}</p>
    {% if slot %}
        <div class="mt-2">
            {{ slot }}
        </div>
    {% endif %}
</div>
