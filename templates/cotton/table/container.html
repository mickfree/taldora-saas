<c-vars max_height="max-h-[640px]" class="" />

<div class="overflow-auto custom-scrollbar w-full {{ max_height }} bg-white dark:bg-brandBg border-x border-b border-slate-200 dark:border-brandHover {{ attrs.class }}">
    <table class="w-full text-left text-xs border-collapse">
        {% if head or slots.head %}
        <thead class="sticky top-0 bg-white/95 dark:bg-brandBg/95 backdrop-blur-md text-brandText dark:text-brandText font-semibold border-b-2 border-slate-200 dark:border-brandHover z-10">
            <tr>
                {% if head %}{{ head }}{% else %}{{ slots.head }}{% endif %}
            </tr>
        </thead>
        {% endif %}

        <tbody class="divide-y divide-slate-100 dark:divide-slate-800/60 text-slate-700 dark:text-slate-300">
            {% if body %}{{ body }}{% elif slots.body %}{{ slots.body }}{% else %}{{ slot }}{% endif %}
        </tbody>
    </table>
</div>
