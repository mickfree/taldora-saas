<c-vars name="" title="" size="md" open="false" show_close="true" class="" />

<div x-data="{ 
         open: {% if open == 'true' or open == True %}true{% else %}false{% endif %},
         modalId: '{{ name }}',
         close() { this.open = false; }
     }"
     @open-modal.window="if (modalId && ($event.detail === modalId || $event.detail?.name === modalId)) open = true"
     @close-modal.window="if (!modalId || $event.detail === modalId || $event.detail?.name === modalId) open = false"
     class="inline-block {{ attrs.class }}">
    
    <!-- Trigger Slot -->
    {% if trigger or slots.trigger %}
        <div @click="open = true" class="cursor-pointer inline-flex">
            {% if trigger %}{{ trigger }}{% else %}{{ slots.trigger }}{% endif %}
        </div>
    {% endif %}

    <!-- Modal Dialog (Teleported to Body) -->
    <template x-teleport="body">
        <div x-show="open"
             x-cloak
             @keydown.escape.window="close()"
             class="fixed inset-0 z-[9999] flex items-center justify-center p-4 sm:p-6 overflow-y-auto"
             role="dialog"
             aria-modal="true">
            
            <!-- Backdrop Overlay -->
            <div x-show="open"
                 x-transition:enter="ease-out duration-300"
                 x-transition:enter-start="opacity-0"
                 x-transition:enter-end="opacity-100"
                 x-transition:leave="ease-in duration-200"
                 x-transition:leave-start="opacity-100"
                 x-transition:leave-end="opacity-0"
                 @click="close()"
                 class="fixed inset-0 bg-brandBg/70 backdrop-blur-sm"></div>

            <!-- Modal Content Card -->
            <div x-show="open"
                 x-transition:enter="ease-out duration-300"
                 x-transition:enter-start="opacity-0 scale-95 translate-y-2"
                 x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                 x-transition:leave="ease-in duration-200"
                 x-transition:leave-start="opacity-100 scale-100 translate-y-0"
                 x-transition:leave-end="opacity-0 scale-95 translate-y-2"
                 @click.outside="close()"
                 class="relative z-10 w-full {% if size == 'sm' %}max-w-sm{% elif size == 'lg' %}max-w-2xl{% elif size == 'xl' %}max-w-4xl{% elif size == '2xl' %}max-w-6xl{% elif size == 'full' %}max-w-full mx-4{% else %}max-w-lg{% endif %} bg-white dark:bg-brandBg border border-slate-200 dark:border-brandHover rounded-2xl shadow-2xl overflow-hidden flex flex-col my-auto max-h-[90vh]">
                
                <!-- Header -->
                {% if header or slots.header %}
                    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-brandHover bg-slate-50/50 dark:bg-brandHover/20">
                        <div class="w-full">
                            {% if header %}{{ header }}{% else %}{{ slots.header }}{% endif %}
                        </div>
                        {% if show_close == 'true' or show_close == True or show_close != 'false' %}
                        <button type="button" 
                                @click="close()" 
                                title="Cerrar (Esc)"
                                class="ml-3 p-1.5 rounded-lg text-slate-400 hover:text-rose-500 dark:hover:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-950/40 transition-colors flex-shrink-0">
                            <c-ui.icon name="x" class="text-lg" />
                        </button>
                        {% endif %}
                    </div>
                {% elif title %}
                    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-brandHover bg-slate-50/50 dark:bg-brandHover/20">
                        <h3 class="text-base font-semibold text-slate-800 dark:text-slate-100 truncate pr-4">
                            {{ title }}
                        </h3>
                        {% if show_close == 'true' or show_close == True or show_close != 'false' %}
                        <button type="button" 
                                @click="close()" 
                                title="Cerrar (Esc)"
                                class="p-1.5 rounded-lg text-slate-400 hover:text-rose-500 dark:hover:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-950/40 transition-colors flex-shrink-0">
                            <c-ui.icon name="x" class="text-lg" />
                        </button>
                        {% endif %}
                    </div>
                {% endif %}

                <!-- Body -->
                <div class="p-6 overflow-y-auto flex-1 text-sm text-slate-600 dark:text-slate-300 leading-relaxed">
                    {% if body %}{{ body }}{% elif slots.body %}{{ slots.body }}{% else %}{{ slot }}{% endif %}
                </div>

                <!-- Footer -->
                {% if footer or slots.footer %}
                    <div class="flex items-center justify-end gap-3 px-6 py-3.5 border-t border-slate-100 dark:border-brandHover bg-slate-50/50 dark:bg-brandHover/20">
                        {% if footer %}{{ footer }}{% else %}{{ slots.footer }}{% endif %}
                    </div>
                {% endif %}

            </div>
        </div>
    </template>
</div>
