<!-- templates/cotton/ui/button.html -->
{% if "/" in attrs.href or attrs.href == "#" %}
    <a href="{{ attrs.href }}"
        class="inline-flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-semibold rounded-lg shadow-md transition-all active:scale-95 duration-150 {{ attrs.class|default:'text-white bg-primary-600 hover:bg-primary-500 shadow-primary-600/10' }}"
        {{ attributes }}>
        {{ slot }}
    </a>
{% else %}
    <a href="{% url attrs.href %}"
        class="inline-flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-semibold rounded-lg shadow-md transition-all active:scale-95 duration-150 {{ attrs.class|default:'text-white bg-primary-600 hover:bg-primary-500 shadow-primary-600/10' }}"
        {{ attributes }}>
        {{ slot }}
    </a>
{% endif %}
