<c-vars src="" title="Vista previa de imagen" alt="Imagen" />

{% if src %}
<div x-data="{ open: false }" class="inline-block">
    <!-- Trigger -->
    {% if slot %}
        <div @click="open = true" class="cursor-pointer inline-flex">
            {{ slot }}
        </div>
    {% else %}
        <button type="button" 
                @click="open = true" 
                title="Ver imagen"
                class="inline-flex items-center justify-center p-1.5 rounded-lg text-slate-400 hover:text-brandAccent hover:bg-slate-100 dark:hover:bg-brandHover/50 transition-colors">
            <c-ui.icon name="eye" class="text-base" />
        </button>
    {% endif %}

    <!-- Modal Backdrop & Dialog -->
    <template x-teleport="body">
        <div x-show="open"
             x-cloak
             @keydown.escape.window="open = false"
             class="fixed inset-0 z-[9999] flex items-center justify-center p-4 sm:p-6 overflow-y-auto"
             role="dialog"
             aria-modal="true">
            
            <!-- Backdrop Overlay -->
            <div x-show="open"
                 x-transition:enter="ease-out duration-300"
                 x-transition:enter-start="opacity-0"
                 x-transition:enter-end="opacity-100"
                 x-transition:leave="ease-in duration-200"
                 x-transition:leave-start="opacity-100"
                 x-transition:leave-end="opacity-0"
                 @click="open = false"
                 class="fixed inset-0 bg-slate-950/75 backdrop-blur-sm"></div>

            <!-- Modal Content Card -->
            <div x-show="open"
                 x-transition:enter="ease-out duration-300"
                 x-transition:enter-start="opacity-0 scale-95 translate-y-2"
                 x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                 x-transition:leave="ease-in duration-200"
                 x-transition:leave-start="opacity-100 scale-100 translate-y-0"
                 x-transition:leave-end="opacity-0 scale-95 translate-y-2"
                 @click.outside="open = false"
                 class="relative z-10 w-full max-w-4xl bg-white dark:bg-brandBg border border-slate-200 dark:border-brandHover rounded-2xl shadow-2xl overflow-hidden flex flex-col my-auto">
                
                <!-- Header -->
                <div class="flex items-center justify-between px-5 py-3 border-b border-slate-100 dark:border-brandHover bg-slate-50/50 dark:bg-brandHover/20">
                    <h3 class="text-sm font-semibold text-slate-800 dark:text-slate-100 truncate pr-4">
                        {{ title }}
                    </h3>
                    <div class="flex items-center gap-1.5 flex-shrink-0">
                        <!-- Open Original in New Tab -->
                        <a href="{{ src }}" 
                           target="_blank" 
                           rel="noopener noreferrer"
                           title="Abrir imagen original"
                           class="p-1.5 rounded-lg text-slate-400 hover:text-slate-700 dark:hover:text-white hover:bg-slate-200/60 dark:hover:bg-brandHover transition-colors">
                            <c-ui.icon name="external-link" class="text-base" />
                        </a>

                        <!-- Close Button -->
                        <button type="button" 
                                @click="open = false" 
                                title="Cerrar (Esc)"
                                class="p-1.5 rounded-lg text-slate-400 hover:text-rose-500 dark:hover:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-950/40 transition-colors">
                            <c-ui.icon name="x" class="text-base" />
                        </button>
                    </div>
                </div>

                <!-- Image Viewer Container -->
                <div class="p-4 sm:p-6 flex items-center justify-center bg-slate-950/5 dark:bg-black/40 overflow-auto max-h-[75vh]">
                    <img src="{{ src }}" 
                         alt="{{ alt }}" 
                         class="max-w-full max-h-[70vh] object-contain rounded-lg shadow-md transition-all">
                </div>
            </div>
        </div>
    </template>
</div>
{% endif %}
