<!-- templates/cotton/card.html -->
<div class="p-5 bg-white border border-slate-200 rounded-2xl shadow-sm hover:shadow-md transition-all hover:border-slate-300 dark:bg-brandHover/20 dark:border-brandHover dark:shadow-none dark:hover:border-brandAccent/50 {{ attrs.class }}">
    {% if attrs.title %}
        <h3 class="text-sm font-bold text-slate-800 dark:text-white mb-2.5 whitespace-nowrap overflow-hidden text-ellipsis">{{ attrs.title }}</h3>
    {% endif %}
    <div class="text-xs text-slate-500 dark:text-brandMuted leading-relaxed">
        {{ slot }}
    </div>
</div>
