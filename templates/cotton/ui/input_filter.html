<!-- templates/cotton/ui/input_filter.html -->
<c-vars name="search" label="" value="" placeholder="Buscar..." icon="search" wrapper_class="" class="" />

<div class="space-y-1.5 {{ wrapper_class }}">
    {% if label %}
    <label for="{{ attrs.id|default:name }}" class="block text-xs font-semibold text-slate-700 dark:text-brandMuted">
        {{ label }}
    </label>
    {% endif %}

    <div class="relative flex items-center">
        {% if icon %}
        <div
            class="absolute inset-y-0 left-0 pl-2.5 flex items-center pointer-events-none text-slate-400 dark:text-brandMuted">
            <c-ui.icon name="{{ icon }}" class="text-xs" />
        </div>
        {% endif %}

        <input type="{{ attrs.type|default:'search' }}" name="{{ name }}" id="{{ attrs.id|default:name }}"
            value="{{ value }}" placeholder="{{ placeholder }}"
            class="w-full {% if icon %}pl-8{% else %}pl-3{% endif %} pr-3 py-2 text-xs rounded-lg border bg-white dark:bg-brandBg text-slate-800 dark:text-white border-slate-200 dark:border-brandHover focus:outline-none focus:ring-1 focus:ring-primary-500 focus:border-primary-500 placeholder-slate-400 dark:placeholder-brandMuted/50 transition-all duration-150 {{ class }} {{ attrs.class }}"
            {{ attrs.extra }}>
    </div>
</div>
