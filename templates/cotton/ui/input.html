<!-- templates/cotton/ui/input.html -->
<div class="space-y-1.5 {{ attrs.wrapper_class }}">
    {% if attrs.label %}
        <label for="{{ attrs.id|default:attrs.name }}" class="block text-xs font-semibold text-slate-700 dark:text-brandMuted">
            {{ attrs.label }}
            {% if attrs.required %}<span class="text-rose-500">*</span>{% endif %}
        </label>
    {% endif %}
    
    <div class="relative" {% if attrs.type == 'password' and attrs.toggle != 'false' %}x-data="{ showPassword: false }"{% endif %}>
        <input 
            {% if attrs.type == 'password' and attrs.toggle != 'false' %}
                :type="showPassword ? 'text' : 'password'"
            {% else %}
                type="{{ attrs.type|default:'text' }}"
            {% endif %}
            name="{{ attrs.name }}" 
            id="{{ attrs.id|default:attrs.name }}" 
            value="{{ attrs.value|default:'' }}"
            placeholder="{{ attrs.placeholder|default:'' }}"
            {% if attrs.required %}required{% endif %}
            {% if attrs.disabled %}disabled{% endif %}
            {% if attrs.readonly %}readonly{% endif %}
            {% if attrs.autocomplete %}autocomplete="{{ attrs.autocomplete }}"{% endif %}
            class="w-full pl-3 {% if attrs.type == 'password' and attrs.toggle != 'false' %}pr-10{% else %}pr-3{% endif %} py-2 text-xs rounded-lg border bg-white dark:bg-brandBg text-slate-800 dark:text-white border-slate-200 dark:border-brandHover focus:outline-none focus:ring-1 focus:ring-primary-500 focus:border-primary-500 placeholder-slate-400 dark:placeholder-brandMuted/50 transition-all duration-150 disabled:opacity-60 disabled:cursor-not-allowed {% if attrs.errors %}border-rose-500 focus:ring-rose-500 focus:border-rose-500{% endif %} {{ attrs.class }}"
            {{ attrs.extra }}>

        {% if attrs.type == 'password' and attrs.toggle != 'false' %}
            <button 
                type="button" 
                @click="showPassword = !showPassword"
                class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600 dark:text-brandMuted dark:hover:text-white transition-colors"
                aria-label="Mostrar/Ocultar contraseña">
                <i class="ti ti-eye text-sm" x-show="!showPassword"></i>
                <i class="ti ti-eye-off text-sm" x-show="showPassword" x-cloak></i>
            </button>
        {% endif %}
    </div>

    {% if attrs.help_text %}
        <p class="text-[10px] text-slate-400 dark:text-brandMuted/60 leading-relaxed">{{ attrs.help_text }}</p>
    {% endif %}

    {% if attrs.errors %}
        <div class="text-[10px] text-rose-500 font-medium space-y-0.5 mt-1">
            {% for error in attrs.errors %}
                <p>{{ error }}</p>
            {% empty %}
                <p>{{ attrs.errors }}</p>
            {% endfor %}
        </div>
    {% endif %}
</div>
