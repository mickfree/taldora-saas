{% if user.is_authenticated %}
    <!-- User Dropdown with Alpine.js -->
    <div class="relative" x-data="{ open: false }">
        <button @click="open = !open" 
                class="flex items-center gap-2 text-xs font-medium text-slate-600 hover:text-primary-600 dark:text-brandMuted dark:hover:text-brandAccent transition-colors focus:outline-none select-none">
            <div class="h-6 w-6 rounded-full bg-slate-200 border border-slate-300 dark:bg-brandHover dark:border-brandHover flex items-center justify-center text-primary-600 dark:text-brandAccent font-bold text-[10px]">
                {{ user.email|default:user.username|slice:":1"|upper }}
            </div>
            <span class="max-w-[150px] truncate">{{ user.email|default:user.username }}</span>
            <c-ui.icon name="chevron-down" class="text-[10px] text-slate-400 dark:text-brandMuted transition-transform duration-200" :class="{ 'rotate-180': open }" />
        </button>

        <div x-show="open" 
             @click.away="open = false"
             x-transition:enter="transition ease-out duration-100"
             x-transition:enter-start="transform opacity-0 scale-95"
             x-transition:enter-end="transform opacity-100 scale-100"
             x-transition:leave="transition ease-in duration-75"
             x-transition:leave-start="transform opacity-100 scale-100"
             x-transition:leave-end="transform opacity-0 scale-95"
             class="absolute right-0 mt-2 w-48 rounded-xl bg-white dark:bg-brandBg border border-slate-200 dark:border-brandHover p-1 shadow-lg z-50"
             x-cloak>
            <a href="/admin/" class="flex items-center gap-2 px-3 py-2 text-xs text-slate-600 dark:text-brandMuted hover:text-primary-600 dark:hover:text-brandAccent hover:bg-slate-50 dark:hover:bg-brandHover/50 rounded-lg transition-colors">
                <c-ui.icon name="shield-lock" class="text-sm" />
                Admin Panel
            </a>
            <div class="border-t border-slate-100 dark:border-brandHover my-1"></div>
            <form action="{% url 'account_logout' %}" method="post" class="block w-full">
                {% csrf_token %}
                <button type="submit" class="flex items-center gap-2 w-full text-left px-3 py-2 text-xs text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-950/20 rounded-lg transition-colors">
                    <c-ui.icon name="logout" class="text-sm" />
                    Cerrar Sesión
                </button>
            </form>
        </div>
    </div>
{% else %}
    <a href="{% url 'account_login' %}" class="text-xs font-medium text-slate-600 hover:text-primary-600 dark:text-brandMuted dark:hover:text-brandAccent transition-colors">Iniciar Sesión</a>
    <a href="{% url 'account_signup' %}" class="inline-flex items-center justify-center px-3 py-1 text-xs font-semibold text-white bg-primary-600 hover:bg-primary-500 active:bg-primary-700 rounded-lg transition-all shadow-md shadow-primary-600/10">Registrarse</a>
{% endif %}
