{% if user.is_authenticated and user_usage %}
    <a href="{% url 'plan_list' %}" 
       title="Plan actual: {{ user_usage.plan_name }} ({{ user_usage.requests_used }}/{{ user_usage.monthly_requests }} peticiones consumidas este mes)"
       class="inline-flex items-center gap-2 px-3.5 py-1 text-xs font-medium rounded-lg bg-slate-100 dark:bg-brandHover/60 text-slate-700 dark:text-slate-200 border border-slate-200/80 dark:border-brandHover hover:bg-slate-200/80 dark:hover:bg-brandHover transition-all duration-200 group select-none">
        
        <!-- Nombre del Plan -->
        <span class="font-semibold text-slate-800 dark:text-slate-100 group-hover:text-primary-600 dark:group-hover:text-brandAccent transition-colors">
            Plan: {{ user_usage.plan_name }}
        </span>

        <span class="text-slate-300 dark:text-slate-600">|</span>

        <!-- Uso en peticiones -->
        <span class="font-semibold text-slate-800 dark:text-slate-100 group-hover:text-primary-600 dark:group-hover:text-brandAccent transition-colors">
            {{ user_usage.requests_used }} / {{ user_usage.monthly_requests }} <span class="hidden sm:inline">req</span>
        </span>
    </a>
{% endif %}
