{% if users %}
<ul class="py-1">
    {% for u in users %}
    <li @click="selectUser({ id: '{{ u.id }}', email: '{{ u.email }}', username: '{{ u.username }}' })"
        class="px-3 py-2 cursor-pointer hover:bg-slate-100 dark:hover:bg-brandHover/60 flex items-center justify-between transition-colors group">
        <div class="flex items-center gap-2 min-w-0">
            <div class="h-6 w-6 rounded-full bg-primary-100 dark:bg-primary-900/40 text-primary-600 dark:text-brandAccent flex items-center justify-center text-[10px] font-bold shrink-0">
                {{ u.username|slice:":1"|upper }}
            </div>
            <div class="flex flex-col min-w-0">
                <span class="text-xs font-semibold text-slate-800 dark:text-white truncate group-hover:text-primary-600 dark:group-hover:text-brandAccent">
                    {{ u.username }}
                </span>
                <span class="text-[11px] text-slate-400 dark:text-brandMuted truncate">
                    {{ u.email }}
                </span>
            </div>
        </div>
        <c-ui.icon name="chevron-right" class="text-xs text-slate-300 dark:text-brandMuted group-hover:text-primary-500 shrink-0 ml-2" />
    </li>
    {% endfor %}
</ul>
{% endif %}
