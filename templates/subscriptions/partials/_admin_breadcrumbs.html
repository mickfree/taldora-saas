{% with page=active_page|default:request.resolver_match.url_name %}
<c-ui.breadcrumbs>
    <c-ui.breadcrumbs_item href="{% url 'home' %}" icon="home" label="Inicio" />
    <c-ui.breadcrumbs_item href="{% url 'admin_payment_list' %}" icon="shield-check" label="Administración">
        <c-slot name="menu">
            <a href="{% url 'admin_payment_list' %}" 
               class="flex items-center gap-2 px-3 py-2 text-xs rounded-lg transition-colors whitespace-nowrap {% if page == 'admin_payment_list' %}bg-slate-100 dark:bg-brandHover font-semibold text-slate-900 dark:text-white{% else %}text-slate-600 dark:text-brandMuted hover:text-primary-600 dark:hover:text-brandAccent hover:bg-slate-100 dark:hover:bg-brandHover/50{% endif %}">
                <c-ui.icon name="shield-check" class="text-sm {% if page == 'admin_payment_list' %}text-primary-600 dark:text-brandAccent{% endif %}" />
                <span>Validar Pagos (Admin)</span>
            </a>
        </c-slot>
    </c-ui.breadcrumbs_item>

    {% if page == 'admin_payment_list' %}
        <c-ui.breadcrumbs_item icon="shield-check" label="Validar Pagos (Admin)" active="true" />
    {% endif %}
</c-ui.breadcrumbs>
{% endwith %}
