<form 
    method="post" 
    id="payment-proof-form" 
    action="{% url 'submit_payment_proof' %}"
    hx-post="{% url 'submit_payment_proof' %}" 
    hx-target="#container-plans" 
    hx-swap="innerHTML" 
    enctype="multipart/form-data" 
    class="space-y-4">

    {% csrf_token %}

    <div class="space-y-1.5">
        <label class="block text-xs font-semibold text-slate-700 dark:text-brandMuted">Plan a Contratar
        <span class="text-rose-500">*</span></label>
        <select name="plan" x-model="selectedPlanId" required
            class="w-full px-3 py-2 text-xs rounded-lg border bg-white dark:bg-brandBg text-slate-800 dark:text-white border-slate-200 dark:border-brandHover focus:outline-none focus:ring-1 focus:ring-primary-500 focus:border-primary-500 transition-all duration-150">
            <option value="">-- Selecciona un plan --</option>
            {% for plan in plans %}
            {% if not plan.is_free %}
            <option value="{{ plan.id }}">{{ plan.name }} ({{ plan.monthly_requests|stringformat:"d" }}
                req/mes)</option>
            {% endif %}
            {% endfor %}
        </select>
    </div>

    <div class="space-y-1.5">
        <label class="block text-xs font-semibold text-slate-700 dark:text-brandMuted">Ciclo de Facturación
            <span class="text-rose-500">*</span></label>
        <select name="billing_cycle" x-model="billingCycle" required
            class="w-full px-3 py-2 text-xs rounded-lg border bg-white dark:bg-brandBg text-slate-800 dark:text-white border-slate-200 dark:border-brandHover focus:outline-none focus:ring-1 focus:ring-primary-500 focus:border-primary-500 transition-all duration-150">
            <option value="MONTHLY">Mensual</option>
            <option value="ANNUAL">Anual (~20% descuento)</option>
        </select>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <c-ui.input name="bank_name" label="Banco / Aplicación" placeholder="Ej. BCP, Yape, Plin"
            value="{{ form.bank_name.value|default:'' }}" :errors="form.bank_name.errors" required="true" />
        <c-ui.input name="reference_number" label="N° de Operación" placeholder="Ej. 09482715"
            value="{{ form.reference_number.value|default:'' }}" :errors="form.reference_number.errors"
            required="true" />
    </div>

    <c-ui.input type="number" name="amount" label="Monto Depositado (PEN)" placeholder="0.00"
        value="{{ form.amount.value|default:'' }}" :errors="form.amount.errors" extra='step="0.01"'
        required="true" />

    <div class="space-y-1.5">
        <label class="block text-xs font-semibold text-slate-700 dark:text-brandMuted">
            Imagen del Comprobante (Opcional)
        </label>
        <input type="file" name="proof_file" accept="image/*,.pdf"
            class="w-full px-3 py-2 text-xs rounded-lg border bg-white dark:bg-brandBg text-slate-800 dark:text-white border-slate-200 dark:border-brandHover focus:outline-none focus:ring-1 focus:ring-primary-500 focus:border-primary-500 transition-all duration-150" />
        {% if form.proof_file.errors %}
        <div class="text-[10px] text-rose-500 font-medium mt-1">
            {% for error in form.proof_file.errors %}<p>{{ error }}</p>{% endfor %}
        </div>
        {% endif %}
    </div>

    <div class="pt-4 flex justify-end gap-3 border-t border-slate-100 dark:border-slate-800">
        <button type="button" @click="close()"
            class="px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-xs font-semibold rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
            Cancelar
        </button>
        <c-ui.button type="submit" class="btn-confirm text-xs font-bold">
            Enviar Comprobante
        </c-ui.button>
    </div>
</form>
