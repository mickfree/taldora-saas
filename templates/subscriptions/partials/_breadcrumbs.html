{% with page=active_page|default:request.resolver_match.url_name %}
<c-ui.breadcrumbs>
    <c-ui.breadcrumbs_item href="{% url 'home' %}" icon="home" label="Inicio" />
    <c-ui.breadcrumbs_item href="{% url 'plan_list' %}" icon="shopping-cart" label="Subscripciones">
        <c-slot name="menu">
            <a href="{% url 'plan_list' %}" 
               class="flex items-center gap-2 px-3 py-2 text-xs rounded-lg transition-colors whitespace-nowrap {% if page == 'plan_list' %}bg-slate-100 dark:bg-brandHover font-semibold text-slate-900 dark:text-white{% else %}text-slate-600 dark:text-brandMuted hover:text-primary-600 dark:hover:text-brandAccent hover:bg-slate-100 dark:hover:bg-brandHover/50{% endif %}">
                <c-ui.icon name="shopping-cart" class="text-sm {% if page == 'plan_list' %}text-primary-600 dark:text-brandAccent{% endif %}" />
                <span>Planes y Suscripciones</span>
            </a>
            <a href="{% url 'history_payment_list' %}" 
               class="flex items-center gap-2 px-3 py-2 text-xs rounded-lg transition-colors whitespace-nowrap {% if page == 'history_payment_list' %}bg-slate-100 dark:bg-brandHover font-semibold text-slate-900 dark:text-white{% else %}text-slate-600 dark:text-brandMuted hover:text-primary-600 dark:hover:text-brandAccent hover:bg-slate-100 dark:hover:bg-brandHover/50{% endif %}">
                <c-ui.icon name="receipt" class="text-sm {% if page == 'history_payment_list' %}text-primary-600 dark:text-brandAccent{% endif %}" />
                <span>Historial de Pagos</span>
            </a>
        </c-slot>
    </c-ui.breadcrumbs_item>

    {% if page == 'plan_list' %}
        <c-ui.breadcrumbs_item icon="shopping-cart" label="Planes y Suscripciones" active="true" />
    {% elif page == 'history_payment_list' %}
        <c-ui.breadcrumbs_item icon="receipt" label="Historial de Pagos" active="true" />
    {% endif %}
</c-ui.breadcrumbs>
{% endwith %}
