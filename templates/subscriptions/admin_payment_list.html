{% extends 'base.html' %}
{% load static %}

{% block breadcrumbs %}
{% include 'subscriptions/partials/_breadcrumbs.html' %}
{% endblock %}

{% block content %}
<div id="admin-payment"> 
    <!-- Header -->
    <c-ui.header title="Gestión y Validación de Pagos"
        description="Revisa y aprueba o rechaza los comprobantes de depósito enviados por los clientes para activar sus suscripciones.">
        <c-slot name="icon">
            <c-ui.icon name="shield-check" class="text-sm" />
        </c-slot>
    </c-ui.header>

    <!-- Lista y Filtros de Comprobantes -->
    <div>
        <c-table.header title="Comprobantes de Pago">
            <c-ui.button_hx type="button" hx_get="#" hx_target="#container-profile" hx_select="#profile-form"
                hx_swap="innerHTML" class="btn-confirm">
                <c-ui.icon name="download" class="text-sm" />
                Exportar
            </c-ui.button_hx>
        </c-table.header>

        <c-table.filter_bar url="{% url 'admin_payment_list' %}" target="#admin-payment-table"
            form_id="admin-payment-filter-form">
            <c-ui.user_autocomplete
                name="user_id"
                label="Cliente / Email"
                placeholder="Buscar por email o usuario..."
                wrapper_class="col-span-1 md:col-span-2"
            />
            <c-ui.input_filter
                name="search"
                placeholder="Banco, N° ref, notas..." 
                label="Búsqueda libre"
                :value="request.GET.search" 
                wrapper_class="col-span-1 md:col-span-2" 
            />
            <c-ui.select
                :field="payment_proof_filter.form.status"
                empty_label="Todos los estados"
                wrapper_class="col-span-1 md:col-span-1"
            />
            <c-ui.select
                :field="payment_proof_filter.form.billing_cycle"
                empty_label="Todos los ciclos"
                wrapper_class="col-span-1 md:col-span-1"
            />
        </c-table.filter_bar>

        <c-table.overlay title="Comprobantes">
            <div id="admin-payment-table">
                {% include 'subscriptions/partials/_admin_payment_table.html' %}
            </div>
        </c-table.overlay>
    </div>

</div>
{% endblock %}
