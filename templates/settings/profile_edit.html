{% extends 'base.html' %}

{% block page_title %}Editar Perfil{% endblock %}

{% block content %}
<form method="post" class="space-y-5" id="profile-form">
    {% csrf_token %}
    <div class="flex items-center gap-3 pb-3 border-b border-slate-100 dark:border-brandHover/50">
        <div
            class="h-10 w-10 rounded-full bg-primary-50 border border-primary-200 dark:bg-brandHover dark:border-brandHover flex items-center justify-center text-primary-600 dark:text-brandAccent font-bold text-sm">
            {{ user.email|default:user.username|slice:":1"|upper }}
        </div>
        <div>
            <h2 class="text-sm font-bold text-slate-800 dark:text-white">Editar Información</h2>
            <p class="text-[10px] text-slate-400 dark:text-brandMuted/60">Actualiza tus detalles personales y de contacto.</p>
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <c-ui.input name="first_name" label="Nombre" value="{{ form.first_name.value|default:'' }}"
            :errors="form.first_name.errors" placeholder="Ej. Juan" />

        <c-ui.input name="last_name" label="Apellidos" value="{{ form.last_name.value|default:'' }}"
            :errors="form.last_name.errors" placeholder="Ej. Pérez" />
    </div>

    <div class="pt-2 flex justify-end gap-3">
        <c-ui.button_hx
            type="button"
            hx_get="{% url 'settings_profile' %}"
            hx_target="#container-profile"
            hx_select="#profile-detail"
            hx_swap="innerHTML"
            class="btn-ghost">
            Cancelar
        </c-ui.button_hx>
        
        <c-ui.button_hx
            type="submit"
            hx_post="{% url 'settings_profile_edit' %}"
            hx_target="#profile-form"
            hx_swap="innerHTML"
            class="btn-confirm">
            Guardar Cambios
        </c-ui.button_hx>
    </div>
</form>
{% endblock %}
