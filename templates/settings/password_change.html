{% extends 'base.html' %}

{% block page_title %}Cambiar Contraseña{% endblock %}

{% block content %}
<div class="space-y-6" id="container-profile">
    <form method="post" action="{% url 'settings_password_change' %}" class="max-w-sm" id="password-change-form"
        hx-post="{% url 'settings_password_change' %}"
        hx-target="#container-profile"
        hx-swap="innerHTML">
        {% csrf_token %}
        
        <c-ui.header title="Cambiar Contraseña" description="Elige una contraseña segura y no la reutilices en otras cuentas.">
            <c-slot name="icon">
                <c-ui.icon name="lock" class="text-sm" />
            </c-slot>
        </c-ui.header>


        <!-- Error general de formulario si existe -->
        {% if form.non_field_errors %}
            <div class="p-3 text-xs bg-rose-50 text-rose-800 border border-rose-200 dark:bg-rose-950/20 dark:text-rose-400 dark:border-rose-800/40 rounded-xl space-y-1">
                {{ form.non_field_errors }}
            </div>
        {% endif %}

        <!-- Contraseña Actual -->
        <c-ui.input 
            type="password"
            name="oldpassword" 
            id="id_oldpassword"
            label="Contraseña actual" 
            :errors="form.oldpassword.errors" 
            placeholder="••••••••" 
            required="true" />

        <!-- Nueva Contraseña -->
        <c-ui.input 
            type="password"
            name="password1" 
            id="id_password1"
            label="Nueva contraseña" 
            :errors="form.password1.errors" 
            placeholder="••••••••" 
            help_text="Usa al menos 8 caracteres."
            required="true" />

        <!-- Confirmar Nueva Contraseña -->
        <c-ui.input 
            type="password"
            name="password2" 
            id="id_password2"
            label="Confirmar nueva contraseña" 
            :errors="form.password2.errors" 
            placeholder="••••••••" 
            required="true" />

        <div class="pt-2 flex justify-end gap-3">
            <c-ui.button_hx
                type="button"
                hx_get="{% url 'settings_profile' %}"
                hx_target="#container-profile"
                hx_select="#profile-detail"
                hx_swap="innerHTML"
                class="btn-ghost">
                Cancelar
            </c-ui.button_hx>
            
            <c-ui.button
                type="submit"
                class="btn-confirm">
                Cambiar Contraseña
            </c-ui.button>
        </div>
    </form>
</div>
{% endblock %}
